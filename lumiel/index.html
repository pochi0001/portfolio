<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMIEL | Natural Beauty Salon</title>
  <meta name="description" content="自然な美しさを、やさしく引き出す。LUMIELのサロンLPです。">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+JP:wght@200;300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">

    <!-- HERO -->
    <section class="hero fade-up">
      <h1 class="logo">LUMIEL</h1>
      <p class="subcopy">Natural Beauty Salon</p>
    </section>

    <!-- CONCEPT -->
    <section class="concept fade-up">
      <p class="section-label">CONCEPT</p>
      <h2 class="concept-title">
        自然な美しさを、<br>
        やさしく引き出す。
      </h2>
      <p class="concept-text">
        ひとりひとりの個性を大切にしながら、<br>
        自然体の美しさを引き出します。
      </p>
    </section>

    <!-- MENU -->
    <section class="menu fade-up">
      <p class="section-label">MENU</p>

      <div class="menu-list">
        <div class="menu-item">
          <span class="name">Cut</span>
          <span class="price">¥4,500</span>
        </div>
        <div class="menu-item">
          <span class="name">Color</span>
          <span class="price">¥6,800</span>
        </div>
        <div class="menu-item">
          <span class="name">Treatment</span>
          <span class="price">¥3,000</span>
        </div>
        <div class="menu-item">
          <span class="name">Perm</span>
          <span class="price">¥7,500</span>
        </div>
      </div>
    </section>

    <!-- STYLE -->
    <section class="style fade-up">
      <p class="section-label">STYLE</p>

      <div class="style-image-wrap">
        <img
          class="style-image"
          src="img/salon.jpg"
          alt="サロン内観"
        >
      </div>

      <p class="style-copy">
        自然体で、<br>
        心地よく。
      </p>
    </section>

    <!-- CTA -->
    <section class="cta fade-up">
      <p class="cta-text">ご予約はこちら</p>
      <a href="#" class="cta-button">
        RESERVE
      </a>
    </section>

    <div class="footer-space"></div>
  </main>

  <script src="main.js"></script>
</body>
</html>
